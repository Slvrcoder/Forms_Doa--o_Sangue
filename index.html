<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doação de Sangue</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav>
        <div class="logo">
           <h3>
            Doação de Sangue
           </h3>

        </div>
            <img src="Assets/Images/Estetoscópio.png" height="50" width="50" alt="Logo do site">
    </nav>

    <header>
        <h1>Doe Sangue, Salve Vidas</h1>
        <p>Faça a diferença na vida de alguém hoje!</p>
    </header>

    <main>
        <div class="container">
            <form id="forms">

                <label for="nome">Nome Completo:</label>
                <input type="text" id="nome" placeholder="Nome Completo">
                <div id="erroNome" class="erro"></div>

                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="Email">
                <div id="erroEmail" class="erro"></div>

                <label for="idade">Idade:</label>
                <input type="number" id="idade" placeholder="Idade">
                <div id="erroIdade" class="erro"></div>

                <label for="peso">Peso:</label>
                <input type="number" id="peso" placeholder="Peso (kg)">
                <div id="erroPeso" class="erro"></div>

                <label for="tipoSangue">Tipo Sanguíneo:</label>
                <select name="tipoSangue" id="tipoSangue">
                    <option value="-">Selecione um tipo</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                </select>
                <div id="erroTipoSangue" class="erro"></div>

                <label for="telefone">Telefone:</label>
                <input type="tel" id="telefone" placeholder="(XX) XXXXX-XXXX">
                <div id="erroTelefone" class="erro"></div>

                <label for="cidade">Cidade:</label>
                <input type="text" id="cidade" placeholder="Cidade">
                <div id="erroCidade" class="erro"></div>

                <label for="estado">Estado:</label>
                <select name="estado" id="estado">
                    <option value="-">Selecione um estado</option>
                    <option value="SP">São Paulo</option>
                    <option value="RJ">Rio de Janeiro</option>
                    <option value="MG">Minas Gerais</option>
                    <option value="RS">Rio Grande do Sul</option>
                    <option value="BA">Bahia</option>
                    <option value="PR">Paraná</option>
                    <option value="SC">Santa Catarina</option>
                    <option value="GO">Goiás</option>
                    <option value="PE">Pernambuco</option>
                    <option value="CE">Ceará</option>
                    <option value="AM">Amazonas</option>
                    <option value="PA">Pará</option>
                    <option value="MA">Maranhão</option>
                    <option value="PB">Paraíba</option>
                    <option value="PI">Piauí</option>
                    <option value="RN">Rio Grande do Norte</option>
                    <option value="AL">Alagoas</option>
                    <option value="SE">Sergipe</option>
                    <option value="TO">Tocantins</option>
    
                </select>
                <div id="erroEstado" class="erro"></div>


                <button type="submit">Enviar</button>

            </form>

            <div id="resultado"></div>
        </div>

    </main>
        <script src="script.js"></script>
</body>

</html>
