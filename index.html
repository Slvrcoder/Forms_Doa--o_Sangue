<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doação de Sangue</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav>
        <ul>
            <li><a href="#about">Sobre</a></li>
            <li><a href="#donate">Como Doar</a></li>
            <li><a href="#contact">Contato</a></li>
        </ul>
    </nav>

    <header>
        <h1>Doe Sangue, Salve Vidas</h1>
        <p>Faça a diferença na vida de alguém hoje!</p>
    </header>

    <main>
        <div class="container">
            <form id="forms">

                <label for="nome">Nome Completo:</label>
                <input type="text" id="nome" placeholder="Nome Completo">
                <div id="erroNome" class="erro"></div>

                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="Email">
                <div id="erroEmail" class="erro"></div>

                <label for="idade">Idade:</label>
                <input type="number" id="idade" placeholder="Idade">
                <div id="erroIdade" class="erro"></div>

                <label for="peso">Peso:</label>
                <input type="number" id="peso" placeholder="Peso (kg)">
                <div id="erroPeso" class="erro"></div>

                <label for="tipoSangue">Tipo Sanguíneo:</label>
                <select name="tipoSangue" id="tipoSangue">
                    <option value="-">Selecione um tipo</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                </select>
                <div id="erroTipoSangue" class="erro"></div>

                <button type="submit">Enviar</button>

            </form>

            <div id="resultado"></div>
        </div>

    </main>
        <script src="script.js"></script>
</body>

</html>
